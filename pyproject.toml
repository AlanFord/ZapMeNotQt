[project]
name = "zapmenotqt"
version = "0.1.0"
description = "A graphical user interface for ZapMeNot"
readme = "README.md"
requires-python = ">=3.11.15"
dependencies = [
    "pandas>=2",
    "pandas-stubs>=3.0.0.260204",
    "pyside2",
    "scipy==1.15",
    "numpy==1.23.5",
    "zapmenot",
]

[dependency-groups]
dev = [
    "pyinstaller>=6.19.0",
    "ruff>=0.15.11",
]

[tool.uv.sources]
zapmenot = { path = "../../../Desktop/github/ZapMeNot/dist/zapmenot-0.2.1-py3-none-any.whl" }

[tool.ruff.lint]
extend-select = ["B"]